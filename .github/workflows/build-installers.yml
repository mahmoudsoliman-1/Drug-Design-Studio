name: Build installers

# Builds the macOS .dmg and Windows .exe and attaches them to a GitHub Release.
# Trigger by pushing a tag like v1.1.0, or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- macOS .dmg
  macos:
    runs-on: macos-13          # Intel build → runs natively on Intel, via Rosetta on Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build frontend
        run: |
          npm ci || npm install
          npx vite build
          rm -rf engine/webdist && cp -R dist engine/webdist

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install engine deps
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Fetch macOS Vina binary
        run: |
          mkdir -p engine/bin
          curl -L -o engine/bin/vina \
            https://github.com/ccsb-scripps/AutoDock-Vina/releases/download/v1.2.5/vina_1.2.5_mac_x86_64
          chmod +x engine/bin/vina

      - name: Bundle AI key
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > engine/.env

      - name: PyInstaller + fixup + dmg
        working-directory: engine
        run: |
          pyinstaller --clean --noconfirm --distpath dist_pkg dds.spec
          python packaging/fix_bundle.py "dist_pkg/Drug Design Studio.app"
          mkdir -p dist_dmg
          cp -R "dist_pkg/Drug Design Studio.app" dist_dmg/
          ln -s /Applications dist_dmg/Applications
          hdiutil create -volname "Drug Design Studio" -srcfolder dist_dmg \
            -ov -format UDZO "Drug-Design-Studio-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: engine/Drug-Design-Studio-macOS.dmg

  # -------------------------------------------------------------- Windows .exe
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build frontend
        run: |
          npm ci || npm install
          npx vite build
          if (Test-Path engine/webdist) { Remove-Item -Recurse -Force engine/webdist }
          Copy-Item -Recurse dist engine/webdist

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install engine deps
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Fetch Windows Vina binary
        run: |
          New-Item -ItemType Directory -Force engine/bin | Out-Null
          curl.exe -L -o engine/bin/vina.exe `
            https://github.com/ccsb-scripps/AutoDock-Vina/releases/download/v1.2.5/vina_1.2.5_win.exe

      - name: Bundle AI key
        run: '"GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" | Out-File -Encoding ascii engine/.env'

      - name: PyInstaller
        working-directory: engine
        run: pyinstaller --clean --noconfirm --distpath dist_pkg dds.spec

      - name: Fixup OpenBabel paths
        working-directory: engine
        run: python packaging/fix_bundle.py dist_pkg/DrugDesignStudio

      - name: Ensure Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        working-directory: engine
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/windows_installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: engine/dist_installer/DrugDesignStudio-Setup.exe

  # ------------------------------------------------------------- attach to release
  release:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/Drug-Design-Studio-macOS.dmg
            windows-exe/DrugDesignStudio-Setup.exe
